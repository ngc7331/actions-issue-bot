rules:
  incomplete_attachment:
    condition:
      - regex_title: '[TEST]'
      - or:
          - regex: '<!-- Uploading .*? -->'
          - regex: '<!-- Failed to upload .*? -->'
      - member: only
    action:
      comment:
        message:
          '@{{ comment.author }} seems you have a incomplete upload. Please
          check.'
      label:
        add: 'more info needed'
      assign:
        add: ngc7331

  resolve:
    condition:
      - regex_title: '[TEST]'
      - regex: "\/resolve"
      - member: only
    action:
      label:
        remove: 'more info needed'
      state:
        reason: completed

  unresolve:
    condition:
      - regex_title: '[TEST]'
      - regex: "\/unresolve"
      - member: only
    action:
      label:
        add: 're-opened'
      state:
        reason: reopened
