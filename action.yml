name: Issue Bot
description:
  Automate replies, labels, assignments, and closing issues based on YAML rules.
author: ngc7331

# Add your action's branding here. This will appear on the GitHub Marketplace.
branding:
  icon: heart
  color: red

inputs:
  config:
    description: Path to the YAML config file containing issue bot rules.
    required: false
    default: .github/issue-bot.yaml
  token:
    description:
      GitHub token with issues:write permission (defaults to GITHUB_TOKEN if not
      provided).
    required: false

outputs: {}

runs:
  using: node24
  main: dist/index.js
